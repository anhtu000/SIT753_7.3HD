global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - flow-alertmanager:9093

scrape_configs:
  - job_name: "flow-prod"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["flow-prod:3000"]

  - job_name: "flow-staging"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["flow-staging:3000"]